<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Cascadia Code','Fira Code',Consolas,'Courier New',monospace" font-size="15">
  <defs>
    <pattern id="crt" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#00ff88" fill-opacity="0.035"/>
    </pattern>
    <mask id="m1"><rect x="34" y="52" width="76"  height="22" fill="#fff" style="transform-origin:34px 0;animation:type .6s  steps(8)  .5s  both"/></mask>
    <mask id="m2"><rect x="34" y="104" width="139" height="22" fill="#fff" style="transform-origin:34px 0;animation:type .9s  steps(15) 2.0s both"/></mask>
    <mask id="m3"><rect x="34" y="156" width="229" height="22" fill="#fff" style="transform-origin:34px 0;animation:type 1.3s steps(25) 3.9s both"/></mask>
    <mask id="m4"><rect x="34" y="252" width="355" height="22" fill="#fff" style="transform-origin:34px 0;animation:type 1.6s steps(39) 6.8s both"/></mask>
  </defs>
  <style>
    @keyframes type{from{transform:scaleX(0)}to{transform:scaleX(1)}}
    @keyframes fin{to{opacity:1}}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    @keyframes fill{from{transform:scaleX(0)}to{transform:scaleX(1)}}
    .o{opacity:0;animation:fin .25s ease-out forwards;}
    .cursor{opacity:0;animation:fin .05s linear 11.2s forwards, blink 1.1s steps(1) 11.3s infinite;}
    .live{animation:blink 1.6s steps(1) infinite;}
  </style>

  <!-- window -->
  <rect x="0.5" y="0.5" width="899" height="379" rx="12" fill="#0a0f0c" stroke="#1e3d2c"/>
  <path d="M12.5 0.5 H887.5 A12 12 0 0 1 899.5 12.5 V36 H0.5 V12.5 A12 12 0 0 1 12.5 0.5 Z" fill="#0e1611"/>
  <line x1="0.5" y1="36" x2="899.5" y2="36" stroke="#1e3d2c"/>
  <circle cx="24" cy="18.5" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="18.5" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="18.5" r="6" fill="#27c93f"/>
  <text x="450" y="23" text-anchor="middle" font-size="12" fill="#7ee2a8">ck@labs: ~/security</text>
  <circle cx="856" cy="18.5" r="3.5" fill="#00ff88" class="live"/>
  <text x="866" y="23" font-size="11" fill="#5c9c78">LIVE</text>

  <!-- crt lines -->
  <rect x="1" y="37" width="898" height="342" fill="url(#crt)"/>

  <!-- session -->
  <g mask="url(#m1)">
    <text x="34" y="68"><tspan fill="#00ccff">$</tspan><tspan fill="#e6ffe9" xml:space="preserve"> whoami</tspan></text>
  </g>
  <text x="34" y="90" fill="#7ee2a8" class="o" style="animation-delay:1.3s">ck-labs :: security researcher [ ai x ml security ]</text>

  <g mask="url(#m2)">
    <text x="34" y="120"><tspan fill="#00ccff">$</tspan><tspan fill="#e6ffe9" xml:space="preserve"> ls ~/projects</tspan></text>
  </g>
  <text x="34" y="142" fill="#00ccff" class="o" style="animation-delay:3.1s" xml:space="preserve">sentinel-arc/    ccc-alert/    pentest-ai-suite/    ai-code-review/</text>

  <g mask="url(#m3)">
    <text x="34" y="172"><tspan fill="#00ccff">$</tspan><tspan fill="#e6ffe9" xml:space="preserve"> ./sentinel-arc --status</tspan></text>
  </g>
  <text x="34" y="194" class="o" style="animation-delay:5.4s"><tspan fill="#00ff88">[ OK ]</tspan><tspan fill="#7ee2a8" xml:space="preserve"> packet scoring engine ......... </tspan><tspan fill="#00ccff">online</tspan></text>
  <text x="34" y="216" class="o" style="animation-delay:5.7s"><tspan fill="#00ff88">[ OK ]</tspan><tspan fill="#7ee2a8" xml:space="preserve"> firewall integration .......... </tspan><tspan fill="#00ccff">active</tspan></text>
  <text x="34" y="238" class="o" style="animation-delay:6.0s"><tspan fill="#00ff88">[ OK ]</tspan><tspan fill="#7ee2a8" xml:space="preserve"> operator dashboard ............ </tspan><tspan fill="#00ccff">live</tspan></text>

  <g mask="url(#m4)">
    <text x="34" y="268"><tspan fill="#00ccff">$</tspan><tspan fill="#e6ffe9" xml:space="preserve"> ./analyze --target ai-generated-code</tspan></text>
  </g>
  <g class="o" style="animation-delay:8.6s">
    <text x="34" y="290" fill="#7ee2a8">scanning</text>
    <rect x="118" y="278" width="182" height="13" fill="none" stroke="#1e3d2c"/>
    <rect x="120" y="280" width="178" height="9" fill="#00ff88" style="transform-origin:120px 0;animation:fill 1.6s steps(20) 8.7s both"/>
  </g>
  <text x="312" y="290" fill="#00ff88" class="o" style="animation-delay:10.3s">100%</text>
  <text x="34" y="312" class="o" style="animation-delay:10.6s"><tspan fill="#00ff88">&gt;</tspan><tspan fill="#e6ffe9" xml:space="preserve"> verdict: manual review catches what scanners miss</tspan></text>

  <text x="34" y="344" fill="#00ccff" class="o" style="animation-delay:11.2s">$</text>
  <rect x="50" y="331" width="9" height="16" fill="#00ff88" class="cursor"/>
</svg>
