<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 150" font-family="'Cascadia Code','Fira Code',Consolas,'Courier New',monospace">
  <defs>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#007197" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#007197" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#007197" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="frame"><rect x="1" y="1" width="438" height="148" rx="10"/></clipPath>
  </defs>
  <style>
    @keyframes scan{from{transform:translateX(-130px)}to{transform:translateX(570px)}}
    @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
    @keyframes wave{0%,100%{opacity:.1}50%{opacity:.9}}
    .scanbar{animation:scan 4.5s linear 1.1s infinite;}
    .bang{animation:pulse 1.6s ease-in-out infinite;}
    .w1{animation:wave 2.4s ease-in-out infinite;}
    .w2{animation:wave 2.4s ease-in-out .4s infinite;}
    .w3{animation:wave 2.4s ease-in-out .8s infinite;}
  </style>

  <rect x="1" y="1" width="438" height="148" rx="10" fill="#f2f4fa" stroke="#c4cbe1" stroke-width="1.5"/>
  <g clip-path="url(#frame)"><rect class="scanbar" x="0" y="1" width="120" height="2.5" fill="url(#scan)"/></g>
  <path d="M12 22 V12 H22" fill="none" stroke="#007197" stroke-opacity=".6" stroke-width="1.5"/>
  <path d="M418 12 H428 V22" fill="none" stroke="#007197" stroke-opacity=".6" stroke-width="1.5"/>
  <path d="M428 128 V138 H418" fill="none" stroke="#007197" stroke-opacity=".6" stroke-width="1.5"/>
  <path d="M22 138 H12 V128" fill="none" stroke="#007197" stroke-opacity=".6" stroke-width="1.5"/>

  <g transform="translate(55,75)">
    <path d="M0,-22 L21,15 L-21,15 Z" fill="none" stroke="#f52a65" stroke-width="1.8" stroke-linejoin="round" stroke-opacity=".8"/>
    <text x="0" y="10" font-size="19" font-weight="700" fill="#f52a65" text-anchor="middle" class="bang">!</text>
    <path d="M24,-8 A11 11 0 0 1 24,8"   fill="none" stroke="#007197" stroke-width="1.6" class="w1"/>
    <path d="M29,-12 A17 17 0 0 1 29,12" fill="none" stroke="#007197" stroke-width="1.6" class="w2"/>
    <path d="M34,-16 A23 23 0 0 1 34,16" fill="none" stroke="#007197" stroke-width="1.6" class="w3"/>
  </g>

  <text x="105" y="42" font-size="16" font-weight="700" fill="#343b58">CCC-Alert</text>
  <text x="105" y="68" font-size="11.5" fill="#6172b0">AI campus safety system built at a hackathon.</text>
  <text x="105" y="86" font-size="11.5" fill="#6172b0">Chatbot reports plus emergency camera analysis.</text>
  <circle cx="110" cy="122" r="4.5" fill="#b3a125"/>
  <text x="121" y="126" font-size="11" fill="#6172b0">JavaScript</text>
  <text x="420" y="126" font-size="11" fill="#848cb5" text-anchor="end">[ AI / SAFETY ]</text>
</svg>
