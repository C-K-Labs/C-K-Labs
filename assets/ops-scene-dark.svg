    <polygon points="-46,-59 0,-36 0,0 -46,-23" fill="#14151d"/>
    <polygon points="0,-36 46,-59 46,-23 0,0" fill="#202839"/>
    <g transform="translate(0,-82)">
      <polygon points="0,-22 28,-36 0,-50 -28,-36" fill="#3d59a1"/>
      <polygon points="-28,-36 0,-22 0,0 -28,-14" fill="#1d2233"/>
      <polygon points="0,-22 28,-36 28,-14 0,0" fill="#2a3350"/>
