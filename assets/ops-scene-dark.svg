  </g>

  <g transform="translate(450,302)">
    <g transform="scale(1,0.4615)">
      <circle r="130" fill="none" stroke="#3b4261" stroke-dasharray="5 7"/>
      <circle r="85" fill="none" stroke="#3b4261" stroke-dasharray="4 8"/>
      <g>
        <line x1="0" y1="0" x2="130" y2="0" stroke="#7dcfff" stroke-width="2" stroke-opacity=".8"/>
        <line x1="0" y1="0" x2="127" y2="-27" stroke="#7dcfff" stroke-width="2" stroke-opacity=".3"/>
        <line x1="0" y1="0" x2="120" y2="-52" stroke="#7dcfff" stroke-width="2" stroke-opacity=".12"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="7s" repeatCount="indefinite"/>
      </g>
    </g>
  </g>

  <path id="p1" d="M300,325 C340,315 380,300 420,290" fill="none" stroke="#3b4261" stroke-width="1.5"/>
  <circle r="3.5" fill="#7aa2f7">
    <animateMotion dur="2.4s" repeatCount="indefinite"><mpath href="#p1" xlink:href="#p1"/></animateMotion>
  </circle>
  <circle r="3.5" fill="#7aa2f7" opacity=".6">
    <animateMotion dur="2.4s" begin="1.2s" repeatCount="indefinite"><mpath href="#p1" xlink:href="#p1"/></animateMotion>
  </circle>

  <path id="p2" d="M480,290 C540,285 600,290 655,295" fill="none" stroke="#3b4261" stroke-width="1.5"/>
  <circle r="3.5" fill="#7dcfff">
    <animateMotion dur="2.8s" repeatCount="indefinite"><mpath href="#p2" xlink:href="#p2"/></animateMotion>
  </circle>
  <circle r="3.5" fill="#7dcfff" opacity=".6">
    <animateMotion dur="2.8s" begin="1.4s" repeatCount="indefinite"><mpath href="#p2" xlink:href="#p2"/></animateMotion>
  </circle>

  <path id="atk" d="M90,140 L206,292" fill="none" stroke="none"/>
  <circle r="4" fill="#f7768e">
