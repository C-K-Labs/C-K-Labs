  <g font-size="11" fill="#565f89">
    <circle cx="28" cy="96" r="3" fill="#f7768e" class="live"/>
    <text x="38" y="100">[ OPS VIEW :: LIVE ]</text>
    <text x="872" y="100" text-anchor="end">THREAT MONITOR</text>
    <text x="872" y="384" text-anchor="end" fill="#414868">24/7 :: AUTONOMOUS DEFENSE</text>
    <text x="28" y="384" fill="#414868">render :: isometric.v4</text>
  </g>

  <rect y="70" width="900" height="330" fill="url(#vig2)" pointer-events="none"/>
  </g>
  <rect x="1" y="71" width="898" height="328" rx="14" fill="none" stroke="#3b4261" stroke-width="1.5"/>
