<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" font-family="'Cascadia Code','Fira Code',Consolas,'Courier New',monospace">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#7aa2f7" stroke-opacity="0.06"/>
    </pattern>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.8">
      <stop offset="0" stop-color="#13141c" stop-opacity="0"/>
      <stop offset="0.65" stop-color="#13141c" stop-opacity="0"/>
      <stop offset="1" stop-color="#13141c" stop-opacity="0.85"/>
    </radialGradient>
    <linearGradient id="scanG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7dcfff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7dcfff" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#7dcfff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa2f7"/>
      <stop offset="0.55" stop-color="#2ac3de"/>
      <stop offset="1" stop-color="#7dcfff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame"><rect x="1" y="1" width="898" height="238" rx="14"/></clipPath>
  </defs>
  <style>
    .c1{animation:kill .01s linear forwards;}
    .c2{opacity:0;animation:win .25s linear both;}
    .fin{opacity:0;animation:pop .01s linear forwards;}
    .rise{opacity:0;animation:rise .6s ease-out 1.95s both;}
    .blinkdot{animation:blink 1.6s steps(1) infinite;}
    .cursor{opacity:0;animation:pop .01s linear 1.9s forwards, blink 1.1s steps(1) 2s infinite;}
    .draw{stroke-dasharray:60;stroke-dashoffset:60;animation:draw 0.9s ease-out forwards;}
    .scanline{animation:scanmove 6s linear infinite;}
    .pulse{animation:softpulse 3.2s ease-in-out infinite;}
    @keyframes kill{to{opacity:0}}
    @keyframes win{0%,100%{opacity:0}6%,94%{opacity:1}}
    @keyframes pop{to{opacity:1}}
    @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes scanmove{from{transform:translateY(-12px)}to{transform:translateY(252px)}}
    @keyframes softpulse{0%,100%{opacity:.35}50%{opacity:.75}}
  </style>

  <g clip-path="url(#frame)">
    <rect width="900" height="240" fill="#1a1b26"/>
    <rect width="900" height="240" fill="url(#grid)"/>

    <path class="draw" d="M26 44 V26 H44" fill="none" stroke="#7aa2f7" stroke-width="2" stroke-opacity=".6" style="animation-delay:.1s"/>
    <path class="draw" d="M856 26 H874 V44" fill="none" stroke="#7aa2f7" stroke-width="2" stroke-opacity=".6" style="animation-delay:.3s"/>
    <path class="draw" d="M874 196 V214 H856" fill="none" stroke="#7aa2f7" stroke-width="2" stroke-opacity=".6" style="animation-delay:.5s"/>
    <path class="draw" d="M44 214 H26 V196" fill="none" stroke="#7aa2f7" stroke-width="2" stroke-opacity=".6" style="animation-delay:.7s"/>

    <g font-size="11" fill="#565f89">
      <circle cx="60" cy="38" r="3" fill="#9ece6a" class="blinkdot"/>
      <text x="70" y="42">[ SYSTEM ONLINE ]</text>
      <text x="840" y="42" text-anchor="end">[ EST 2025 ]</text>
      <text x="34" y="222" class="pulse" fill="#414868">0x43 0x4b 0x4c 0x41 0x42 0x53</text>
      <text x="866" y="222" text-anchor="end" class="pulse" fill="#414868" style="animation-delay:1.4s">sha256 :: verified</text>
    </g>

    <g font-size="68" font-weight="700" text-anchor="middle">
      <text x="268" y="130" class="c1" fill="#3d59a1" style="animation-delay:.60s">7</text>
      <text x="268" y="130" class="c2" fill="#3d59a1" style="animation-delay:.60s">#</text>
      <text x="268" y="130" class="fin" fill="url(#titleG)" filter="url(#glow)" style="animation-delay:.85s">C</text>

      <text x="320" y="130" class="c1" fill="#3d59a1" style="animation-delay:.74s">/</text>
      <text x="320" y="130" class="c2" fill="#3d59a1" style="animation-delay:.74s">+</text>
      <text x="320" y="130" class="fin" fill="url(#titleG)" filter="url(#glow)" style="animation-delay:.99s">-</text>

      <text x="372" y="130" class="c1" fill="#3d59a1" style="animation-delay:.88s">X</text>
      <text x="372" y="130" class="c2" fill="#3d59a1" style="animation-delay:.88s">%</text>
      <text x="372" y="130" class="fin" fill="url(#titleG)" filter="url(#glow)" style="animation-delay:1.13s">K</text>

      <text x="424" y="130" class="c1" fill="#3d59a1" style="animation-delay:1.02s">=</text>
      <text x="424" y="130" class="c2" fill="#3d59a1" style="animation-delay:1.02s">*</text>
      <text x="424" y="130" class="fin" fill="url(#titleG)" filter="url(#glow)" style="animation-delay:1.27s">-</text>

      <text x="476" y="130" class="c1" fill="#3d59a1" style="animation-delay:1.16s">1</text>
      <text x="476" y="130" class="c2" fill="#3d59a1" style="animation-delay:1.16s">!</text>
      <text x="476" y="130" class="fin" fill="url(#titleG)" filter="url(#glow)" style="animation-delay:1.41s">L</text>

      <text x="528" y="130" class="c1" fill="#3d59a1" style="animation-delay:1.30s">4</text>
      <text x="528" y="130" class="c2" fill="#3d59a1" style="animation-delay:1.30s">$</text>
      <text x="528" y="130" class="fin" fill="url(#titleG)" filter="url(#glow)" style="animation-delay:1.55s">A</text>

      <text x="580" y="130" class="c1" fill="#3d59a1" style="animation-delay:1.44s">8</text>
      <text x="580" y="130" class="c2" fill="#3d59a1" style="animation-delay:1.44s">@</text>
      <text x="580" y="130" class="fin" fill="url(#titleG)" filter="url(#glow)" style="animation-delay:1.69s">B</text>

      <text x="632" y="130" class="c1" fill="#3d59a1" style="animation-delay:1.58s">5</text>
      <text x="632" y="130" class="c2" fill="#3d59a1" style="animation-delay:1.58s">?</text>
      <text x="632" y="130" class="fin" fill="url(#titleG)" filter="url(#glow)" style="animation-delay:1.83s">S</text>
    </g>
    <rect x="664" y="84" width="24" height="50" fill="#7dcfff" class="cursor"/>

    <text x="450" y="172" text-anchor="middle" font-size="13" letter-spacing="3" fill="#9aa5ce" class="rise">SECURITY RESEARCH  ::  AI x ML SECURITY  ::  NETWORK DEFENSE</text>

    <rect class="scanline" width="900" height="8" fill="url(#scanG)"/>
    <rect width="900" height="240" fill="url(#vig)" pointer-events="none"/>
  </g>
  <rect x="1" y="1" width="898" height="238" rx="14" fill="none" stroke="#3b4261" stroke-width="1.5"/>
</svg>
