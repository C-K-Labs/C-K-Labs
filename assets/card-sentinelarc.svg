<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 150" font-family="'Cascadia Code','Fira Code',Consolas,'Courier New',monospace">
  <defs>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff2e97" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ff2e97" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ff2e97" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="frame"><rect x="1" y="1" width="438" height="148" rx="10"/></clipPath>
  </defs>
  <style>
    @keyframes scan{from{transform:translateX(-130px)}to{transform:translateX(570px)}}
    @keyframes blip{0%,100%{opacity:.1}50%{opacity:1}}
    .scanbar{animation:scan 4.5s linear infinite;}
    .blip{animation:blip 2s ease-in-out infinite;}
  </style>

  <rect x="1" y="1" width="438" height="148" rx="10" fill="#120826" stroke="#35205a" stroke-width="1.5"/>
  <g clip-path="url(#frame)"><rect class="scanbar" x="0" y="1" width="120" height="2.5" fill="url(#scan)"/></g>
  <path d="M12 22 V12 H22" fill="none" stroke="#ff2e97" stroke-opacity=".7" stroke-width="1.5"/>
  <path d="M418 12 H428 V22" fill="none" stroke="#ff2e97" stroke-opacity=".7" stroke-width="1.5"/>
  <path d="M428 128 V138 H418" fill="none" stroke="#ff2e97" stroke-opacity=".7" stroke-width="1.5"/>
  <path d="M22 138 H12 V128" fill="none" stroke="#ff2e97" stroke-opacity=".7" stroke-width="1.5"/>

  <!-- radar icon -->
  <g transform="translate(55,75)" stroke="#ff2e97" fill="none">
    <circle r="8"  stroke-opacity=".7"/>
    <circle r="17" stroke-opacity=".4"/>
    <circle r="26" stroke-opacity=".2"/>
    <g>
      <line x1="0" y1="0" x2="26" y2="0" stroke-opacity=".9" stroke-width="1.5"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </g>
    <circle cx="-11" cy="-9" r="2.5" fill="#00e5ff" stroke="none" class="blip"/>
  </g>

  <text x="105" y="42" font-size="16" font-weight="700" fill="#f3e8ff">SentinelArc</text>
  <text x="105" y="68" font-size="11.5" fill="#9d8ac7">LAN DDoS detection and response platform.</text>
  <text x="105" y="86" font-size="11.5" fill="#9d8ac7">Packet scoring, auto-block, live ops dashboard.</text>
  <circle cx="110" cy="122" r="4.5" fill="#e34c26"/>
  <text x="121" y="126" font-size="11" fill="#a794d4">HTML</text>
  <text x="420" y="126" font-size="11" fill="#7a68a6" text-anchor="end">[ DEFENSE / PLATFORM ]</text>
</svg>
