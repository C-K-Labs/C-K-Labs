<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 150" font-family="'Cascadia Code','Fira Code',Consolas,'Courier New',monospace">
  <defs>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dcfff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7dcfff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#7dcfff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="frame"><rect x="1" y="1" width="438" height="148" rx="10"/></clipPath>
  </defs>
  <style>
    @keyframes scan{from{transform:translateX(-130px)}to{transform:translateX(570px)}}
    @keyframes sweep{0%,100%{transform:translate(0,0)}25%{transform:translate(4px,-3px)}75%{transform:translate(-4px,3px)}}
    @keyframes flick{0%,100%{opacity:.4}50%{opacity:1}}
    .scanbar{animation:scan 4.5s linear 3.3s infinite;}
    .mag{animation:sweep 5s ease-in-out infinite;}
    .code{animation:flick 2.6s ease-in-out infinite;}
  </style>

  <rect x="1" y="1" width="438" height="148" rx="10" fill="#1a1b26" stroke="#3b4261" stroke-width="1.5"/>
  <g clip-path="url(#frame)"><rect class="scanbar" x="0" y="1" width="120" height="2.5" fill="url(#scan)"/></g>
  <path d="M12 22 V12 H22" fill="none" stroke="#7dcfff" stroke-opacity=".7" stroke-width="1.5"/>
  <path d="M418 12 H428 V22" fill="none" stroke="#7dcfff" stroke-opacity=".7" stroke-width="1.5"/>
  <path d="M428 128 V138 H418" fill="none" stroke="#7dcfff" stroke-opacity=".7" stroke-width="1.5"/>
  <path d="M22 138 H12 V128" fill="none" stroke="#7dcfff" stroke-opacity=".7" stroke-width="1.5"/>

  <g transform="translate(55,75)">
    <text x="-2" y="0" font-size="17" fill="#9aa5ce" text-anchor="middle" class="code">&lt;/&gt;</text>
    <g class="mag" stroke="#7aa2f7" fill="none" stroke-width="1.8">
      <circle cx="10" cy="8" r="10" stroke-opacity=".9"/>
      <line x1="17" y1="15" x2="26" y2="24" stroke-linecap="round"/>
    </g>
  </g>

  <text x="105" y="42" font-size="16" font-weight="700" fill="#c0caf5">ai-code-security-review</text>
  <text x="105" y="68" font-size="11.5" fill="#9aa5ce">Manual review vs automated static analysis,</text>
  <text x="105" y="86" font-size="11.5" fill="#9aa5ce">measured on AI-generated Python code.</text>
  <circle cx="110" cy="122" r="4.5" fill="#3572A5"/>
  <text x="121" y="126" font-size="11" fill="#9aa5ce">Python</text>
  <text x="420" y="126" font-size="11" fill="#565f89" text-anchor="end">[ RESEARCH / SAST ]</text>
</svg>
