<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" font-family="'Cascadia Code','Fira Code',Consolas,'Courier New',monospace">
  <defs>
    <linearGradient id="pyl" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2e7de9"/><stop offset="1" stop-color="#007197"/></linearGradient>
    <clipPath id="frame"><rect x="1" y="1" width="878" height="258" rx="14"/></clipPath>
    <clipPath id="barclip"><rect x="34" y="200" width="812" height="16" rx="8"/></clipPath>
  </defs>
  <style>
    @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    @keyframes grow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    .tile{opacity:0;animation:rise .5s ease-out both;}
    .seg{transform-origin:left center;animation:grow .9s ease-out both;}
    .live{animation:blink 1.6s steps(1) infinite;}
  </style>

  <g clip-path="url(#frame)">
    <rect width="880" height="260" fill="#f2f4fa"/>

    <g font-size="11" fill="#848cb5">
      <circle cx="34" cy="30" r="3" fill="#007197" class="live"/>
      <text x="44" y="34">[ TELEMETRY :: LIVE FEED ]</text>
      <text x="846" y="34" text-anchor="end">ck-labs // since 2025</text>
    </g>
    <line x1="34" y1="46" x2="846" y2="46" stroke="#c4cbe1" stroke-dasharray="4 6"/>

    <g>
      <g class="tile" style="animation-delay:.10s">
        <rect x="34"  y="66" width="188" height="96" rx="10" fill="#ffffff" stroke="#d3d9ea"/>
        <text x="52" y="120" font-size="44" font-weight="700" fill="url(#pyl)">15</text>
        <text x="52" y="144" font-size="11" fill="#6172b0" letter-spacing="1">PUBLIC REPOS</text>
      </g>
      <g class="tile" style="animation-delay:.22s">
        <rect x="240" y="66" width="188" height="96" rx="10" fill="#ffffff" stroke="#d3d9ea"/>
        <text x="258" y="120" font-size="44" font-weight="700" fill="url(#pyl)">100<tspan font-size="26" fill="#007197">+</tspan></text>
        <text x="258" y="144" font-size="11" fill="#6172b0" letter-spacing="1">COMMITS</text>
      </g>
      <g class="tile" style="animation-delay:.34s">
        <rect x="446" y="66" width="188" height="96" rx="10" fill="#ffffff" stroke="#d3d9ea"/>
        <text x="464" y="120" font-size="44" font-weight="700" fill="url(#pyl)">5</text>
        <text x="464" y="144" font-size="11" fill="#6172b0" letter-spacing="1">LANGUAGES</text>
      </g>
      <g class="tile" style="animation-delay:.46s">
        <rect x="652" y="66" width="194" height="96" rx="10" fill="#ffffff" stroke="#d3d9ea"/>
        <text x="670" y="120" font-size="44" font-weight="700" fill="url(#pyl)">3</text>
        <text x="670" y="144" font-size="11" fill="#6172b0" letter-spacing="1">FOCUS DOMAINS</text>
      </g>
    </g>

    <text x="34" y="190" font-size="11" fill="#6172b0" letter-spacing="1">LANGUAGE DISTRIBUTION</text>
    <g clip-path="url(#barclip)">
      <rect x="34"  y="200" width="812" height="16" fill="#e1e6f2"/>
      <rect class="seg" x="34"  y="200" width="365" height="16" fill="#2e7de9" style="animation-delay:.5s"/>
      <rect class="seg" x="399" y="200" width="163" height="16" fill="#007197" style="animation-delay:.6s"/>
      <rect class="seg" x="562" y="200" width="98"  height="16" fill="#8c4bd8" style="animation-delay:.7s"/>
      <rect class="seg" x="660" y="200" width="98"  height="16" fill="#587539" style="animation-delay:.8s"/>
      <rect class="seg" x="758" y="200" width="88"  height="16" fill="#b3730f" style="animation-delay:.9s"/>
    </g>

    <g font-size="11" fill="#6172b0" class="tile" style="animation-delay:1s">
      <circle cx="40"  cy="238" r="4" fill="#2e7de9"/><text x="50"  y="242">Python 45%</text>
      <circle cx="182" cy="238" r="4" fill="#007197"/><text x="192" y="242">HTML 20%</text>
      <circle cx="310" cy="238" r="4" fill="#8c4bd8"/><text x="320" y="242">JavaScript 12%</text>
      <circle cx="470" cy="238" r="4" fill="#587539"/><text x="480" y="242">C++ 12%</text>
      <circle cx="590" cy="238" r="4" fill="#b3730f"/><text x="600" y="242">Jupyter 11%</text>
    </g>
  </g>
  <rect x="1" y="1" width="878" height="258" rx="14" fill="none" stroke="#d3d9ea" stroke-width="1.5"/>
</svg>
