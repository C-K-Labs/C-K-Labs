name: generate-snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate contribution snakes (dark and light)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=#7aa2f7&color_dots=#1f2335,#2c3a63,#3d59a1,#5a7fd6,#7dcfff
            dist/github-snake-light.svg?color_snake=#2e7de9&color_dots=#e9edf7,#c4d2f0,#8fb0e8,#5a8ade,#2e59c7

      - name: Push snakes to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
