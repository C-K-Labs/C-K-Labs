name: generate-snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate contribution snakes (dark and light)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=#ff2e97&color_dots=#160b2e,#3b1d5e,#6b2fa0,#b04cff,#ff2e97
            dist/github-snake-light.svg?color_snake=#d81b60&color_dots=#f3ebfb,#dcc2f7,#b678ee,#8a3fd6,#5e1fa8

      - name: Push snakes to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
